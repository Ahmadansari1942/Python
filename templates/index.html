<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad S Flask App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 50px 40px;
            background: rgba(255,255,255,0.07);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            max-width: 600px;
            width: 90%;
        }

        .badge {
            display: inline-block;
            background: rgba(99, 179, 237, 0.2);
            color: #63b3ed;
            border: 1px solid #63b3ed44;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        h1 span { color: #63b3ed; }

        p.subtitle {
            color: #a0aec0;
            font-size: 16px;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #63b3ed;
            color: #1a1a2e;
        }

        .btn-primary:hover {
            background: #90cdf4;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: #63b3ed;
            border: 2px solid #63b3ed;
        }

        .btn-secondary:hover {
            background: rgba(99,179,237,0.1);
            transform: translateY(-2px);
        }

        .btn-ghost {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .btn-ghost:hover {
            background: rgba(255,255,255,0.14);
            transform: translateY(-2px);
        }

        footer {
            margin-top: 30px;
            color: #4a5568;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">🐍 Python + Flask</div>
        <h1>Python, <span>World</span></h1>
        <h2>app, <span>start</span></h2>
        <p class="subtitle">
            A simple Flask app by <strong>Ahmad</strong>.<br>
            Built clean, ready for GitHub & CI/CD pipeline.
            ahf
        </p>
        <div class="buttons">
            <a href="/about" class="btn btn-primary">About</a>
            <a href="/api/hello" class="btn btn-secondary">API Test</a>
            <a href="https://github.com" target="_blank" class="btn btn-ghost">GitHub →</a>
        </div>
    </div>
    <footer>Ahmad © 2024 — Flask App</footer>
</body>
</html>
